# =============================================================================
# LOCAL RUN — Run the built app image locally after a successful build
# Usage:
#   docker compose -f .local/docker-compose.run.yml up         # foreground
#   docker compose -f .local/docker-compose.run.yml up -d      # background
#   docker compose -f .local/docker-compose.run.yml down       # stop
#   make run                                                   # shortcut
# =============================================================================

name: foss-run

services:

  app:
    image: ${IMAGE_REGISTRY:-localhost}/${PROJECT_NAME:-zot}:${OUR_VERSION:-dev}-source
    pull_policy: missing
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      APP_ENV: local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/v2/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
