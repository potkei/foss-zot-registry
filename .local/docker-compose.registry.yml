# =============================================================================
# LOCAL REGISTRY — OCI-native image storage for local dev (Zot)
#
# Two variants — swap the active service to choose:
#
#   registry-minimal  → push/pull only, scratch runtime, no UI      → localhost:5050
#   registry-ui       → push/pull + browser UI at http://localhost:5050/ui → localhost:5050
#
# NOTE: Port 5000 is reserved by macOS AirPlay Receiver — host port is 5050.
#
# Usage:
#   make registry-up          # start registry (default: ui variant)
#   make push-local           # build and push to localhost:5000
#   make registry-down        # stop
#
# Push manually:
#   podman push --tls-verify=false localhost:5000/<project>:<tag>
#
# NOTE: For staging/prod use Harbor via its official installer (.deploy/).
#       This registry is for local dev only — data lives in a named volume.
# =============================================================================

name: foss-registry

services:

  # --- Minimal: no UI, scratch runtime ---
  registry-minimal:
    build:
      context: .
      dockerfile: Dockerfile.zot
    image: foss-registry/zot-minimal:v2.1.15
    pull_policy: missing
    profiles: ["minimal"]
    restart: unless-stopped
    ports:
      - "5050:5000"
    volumes:
      - registry_data:/var/lib/registry
      - ./zot-config.json:/etc/zot/config.json:ro

  # --- Full: with UI + search extensions, distroless runtime ---
  registry-ui:
    build:
      context: .
      dockerfile: Dockerfile.zot-ui
    image: foss-registry/zot-ui:v2.1.15
    pull_policy: missing
    profiles: ["ui"]
    restart: unless-stopped
    ports:
      - "5050:5000"
    volumes:
      - registry_data:/var/lib/registry
      - ./zot-config-ui.json:/etc/zot/config.json:ro

volumes:
  registry_data:
