# =============================================================================
# LOCAL SCAN STACK — Zero setup required
# Spins up SonarQube + all scanners locally. No token needed.
# Auto-detected when SONAR_TOKEN is NOT set.
# Usage: docker compose -f .local/docker-compose.scan.yml up --abort-on-container-exit
# =============================================================================

name: foss-scan-local

services:

  # ---------------------------------------------------------------------------
  # SonarQube database
  # ---------------------------------------------------------------------------
  sonardb:
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    pull_policy: missing
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonardb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SonarQube Community (open source)
  # ---------------------------------------------------------------------------
  sonarqube:
    image: sonarqube:${SONARQUBE_VERSION:-lts-community}
    pull_policy: missing
    depends_on:
      sonardb:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Auto-setup: create project + generate token (runs once, then exits)
  # ---------------------------------------------------------------------------
  sonar-setup:
    image: curlimages/curl:latest
    pull_policy: missing
    depends_on:
      sonarqube:
        condition: service_healthy
    volumes:
      - ..:/workspace
      - sonar_token:/sonar-token
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      PROJECT_NAME: ${PROJECT_NAME:-foss-project}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Setting up SonarQube project...'
      # Change default admin password
      curl -su admin:admin -X POST \
        'http://sonarqube:9000/api/users/change_password' \
        -d 'login=admin&previousPassword=admin&password=SonarLocal123!'
      # Create project
      curl -su admin:SonarLocal123! -X POST \
        'http://sonarqube:9000/api/projects/create' \
        -d \"name=${PROJECT_NAME}-fork&project=${PROJECT_NAME}-fork\"
      # Generate user token
      TOKEN=$(curl -su admin:SonarLocal123! -X POST \
        'http://sonarqube:9000/api/user_tokens/generate' \
        -d 'name=local-scan-token' | grep -o '\"token\":\"[^\"]*\"' | cut -d'\"' -f4)
      echo \"SONAR_TOKEN=\$TOKEN\" > /sonar-token/token.env
      echo 'SonarQube ready. Token saved.'
      "

  # ---------------------------------------------------------------------------
  # SonarQube scanner (waits for setup)
  # ---------------------------------------------------------------------------
  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:${SONAR_SCANNER_VERSION:-latest}
    pull_policy: missing
    depends_on:
      sonar-setup:
        condition: service_completed_successfully
    volumes:
      - ..:/usr/src
      - sonar_token:/sonar-token
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "source /sonar-token/token.env && \
       sonar-scanner \
         -Dsonar.projectKey=${PROJECT_NAME:-foss-project}-fork \
         -Dsonar.sources=. \
         -Dsonar.token=$$SONAR_TOKEN"

  # ---------------------------------------------------------------------------
  # Trivy — container CVE + secrets + SBOM
  # ---------------------------------------------------------------------------
  trivy:
    image: aquasec/trivy:${TRIVY_VERSION:-latest}
    pull_policy: missing
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy_cache:/root/.cache/trivy
      - ../reports:/reports
    environment:
      IMAGE_NAME: ${IMAGE_REGISTRY:-localhost:5050}/${PROJECT_NAME:-foss-project}:${OUR_VERSION:-dev}
    command:
      - image
      - --format=json
      - --output=/reports/trivy.json
      - --ignorefile=/reports/../.trivyignore
      - --insecure
      - "$$IMAGE_NAME"

  # ---------------------------------------------------------------------------
  # Semgrep — lightweight SAST (no server needed)
  # ---------------------------------------------------------------------------
  semgrep:
    build:
      context: ..
      dockerfile: .local/Dockerfile.semgrep
      args:
        SEMGREP_VERSION: ${SEMGREP_VERSION:-1.*}
    image: foss-semgrep:local
    pull_policy: missing
    volumes:
      - ..:/src
    working_dir: /src
    command:
      - semgrep
      - scan
      - --config=auto
      - --json
      - --output=/src/reports/semgrep.json

  # ---------------------------------------------------------------------------
  # OWASP Dependency-Check
  # ---------------------------------------------------------------------------
  dependency-check:
    image: owasp/dependency-check:${OWASP_DC_VERSION:-latest}
    pull_policy: missing
    env_file:
      - path: ../.cicd/docker-resources/secrets/nvd.env
        required: false
    volumes:
      - ..:/src
      - dependency_check_data:/usr/share/dependency-check/data
      - ../reports:/report
    command:
      - --scan=/src
      - --format=HTML
      - --format=JSON
      - --out=/report
      - --project=${PROJECT_NAME:-foss-project}
      - --nvdApiKey=${NVD_API_KEY:-}

  # ---------------------------------------------------------------------------
  # Gitleaks — secret detection in git history
  # ---------------------------------------------------------------------------
  gitleaks:
    image: zricethezav/gitleaks:${GITLEAKS_VERSION:-latest}
    pull_policy: missing
    volumes:
      - ..:/src
    command:
      - detect
      - --source=/src
      - --report-format=json
      - --report-path=/src/reports/gitleaks.json
      - --verbose

  # ---------------------------------------------------------------------------
  # Hadolint — Dockerfile linter
  # ---------------------------------------------------------------------------
  hadolint:
    image: hadolint/hadolint:${HADOLINT_VERSION:-latest}
    pull_policy: missing
    volumes:
      - ..:/src
      - ../reports:/reports
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "hadolint /src/Dockerfile /src/Dockerfile.binary /src/Dockerfile.go \
         --format json > /reports/hadolint.json 2>&1; \
       cat /reports/hadolint.json"

  # ---------------------------------------------------------------------------
  # Checkov — IaC / Helm / Dockerfile security misconfiguration
  # ---------------------------------------------------------------------------
  checkov:
    build:
      context: ..
      dockerfile: .local/Dockerfile.checkov
      args:
        CHECKOV_VERSION: ${CHECKOV_VERSION:-3.*}
    image: foss-checkov:local
    pull_policy: missing
    volumes:
      - ..:/src
      - ../reports:/reports
    command:
      - --directory=/src
      - --output=json
      - --output-file=/reports/checkov.json
      - --soft-fail

volumes:
  sonardb_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_token:
  trivy_cache:
  dependency_check_data:
